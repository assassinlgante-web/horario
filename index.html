<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f2ee;
      --surface: #ffffff;
      --accent: #1a56db;
      --accent2: #e63946;
      --text: #111118;
      --muted: #888899;
      --border: #dddde8;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 2rem 2.5rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      background: var(--surface);
      animation: slideDown 0.6s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-area {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .tag {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      border: 1px solid var(--accent);
      padding: 0.15rem 0.5rem;
      display: inline-block;
      width: fit-content;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.8rem, 7vw, 5rem);
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
    }

    .meta {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .pill {
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
      border: 1px solid var(--border);
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      background: var(--bg);
    }

    .pill.active {
      color: var(--accent);
      border-color: var(--accent);
      background: #eef2ff;
    }

    .dot-pulse {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      display: inline-block;
      margin-right: 0.4rem;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.65); }
    }

    .frame-wrapper {
      flex: 1;
      padding: 1.8rem 2.5rem 2rem;
      animation: fadeUp 0.7s 0.2s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .frame-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
      box-shadow:
        0 1px 2px #0000000a,
        0 8px 32px #00000012,
        0 24px 64px #00000008;
    }

    .frame-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      z-index: 2;
    }

    .frame-topbar {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.7rem 1rem;
      border-bottom: 1px solid var(--border);
      background: #f9f9fc;
    }

    .dot-r { width: 10px; height: 10px; border-radius: 50%; background: #ff5f57; }
    .dot-y { width: 10px; height: 10px; border-radius: 50%; background: #ffbd2e; }
    .dot-g { width: 10px; height: 10px; border-radius: 50%; background: #28c840; }

    .url-bar {
      flex: 1;
      font-size: 0.65rem;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-left: 0.5rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      background: var(--border);
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
    }

    iframe {
      display: block;
      width: 100%;
      height: 560px;
      border: none;
      background: #fff;
    }

    footer {
      padding: 1rem 2.5rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    footer span { color: var(--accent); font-weight: 700; }

    @media (max-width: 600px) {
      header, .frame-wrapper, footer { padding-left: 1.2rem; padding-right: 1.2rem; }
      h1 { font-size: 3rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-area">
      <div class="tag">Escuela de Sistemas</div>
      <h1>HORA<span>RIO</span> ESIS</h1>
    </div>
    <div class="meta">
      <div class="pill active"><span class="dot-pulse"></span>2026</div>
      <div class="pill">Semestre Activo</div>
    </div>
  </header>

  <div class="frame-wrapper">
    <div class="frame-card">
      <div class="frame-topbar">
        <div class="dot-r"></div>
        <div class="dot-y"></div>
        <div class="dot-g"></div>
        <div class="url-bar">docs.google.com/spreadsheets · ESIS 2026</div>
      </div>
      <iframe
        src="https://docs.google.com/spreadsheets/d/1nOKeEqqiHXBcLh7bgvmdeR45msqEutz7RmiRl6IHBLM/htmlembed?rm=minimal&chrome=false&header=false&range=A1:Z34&gid=1318552361"
        title="Horario ESIS 2026">
      </iframe>
    </div>
  </div>

  <footer>
    <div>ESIS &mdash; Ingeniería de Sistemas</div>
    <div>Actualizado <span>2026</span></div>
  </footer>

</body>
</html>
